<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player - Interview Solution</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    h1 { color: #fff; margin-bottom: 20px; }
    
    .player {
      position: relative;
      max-width: 800px;
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .player:fullscreen {
      max-width: none;
      border-radius: 0;
    }
    
    video {
      width: 100%;
      display: block;
      cursor: pointer;
    }
    
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 15px;
      transition: opacity 0.3s;
    }
    
    .controls.hidden {
      opacity: 0;
    }
    
    .progress {
      height: 5px;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      margin-bottom: 10px;
      border-radius: 2px;
    }
    
    .progress-filled {
      height: 100%;
      background: #667eea;
      width: 0%;
      border-radius: 2px;
      transition: width 0.1s;
    }
    
    .progress:hover .progress-filled {
      background: #8b9dff;
    }
    
    .buttons {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .buttons button {
      background: none;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      padding: 5px;
    }
    
    .buttons button:hover {
      color: #667eea;
    }
    
    .time {
      color: #fff;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    
    .volume-control {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .volume {
      width: 80px;
      accent-color: #667eea;
    }
    
    .speed {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 12px;
    }
    
    .spacer { flex: 1; }
    
    .instructions {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-top: 15px;
      text-align: center;
    }
    
    kbd {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Custom Video Player</h1>
  
  <div class="player">
    <video src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"></video>
    
    <div class="controls">
      <div class="progress">
        <div class="progress-filled"></div>
      </div>
      
      <div class="buttons">
        <button class="play-btn" aria-label="Play">▶</button>
        
        <div class="volume-control">
          <button class="volume-btn" aria-label="Mute">🔊</button>
          <input type="range" class="volume" min="0" max="1" step="0.1" value="1">
        </div>
        
        <span class="time">
          <span class="current-time">0:00</span> / <span class="duration">0:00</span>
        </span>
        
        <div class="spacer"></div>
        
        <select class="speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        
        <button class="pip-btn" aria-label="Picture in Picture">🖼</button>
        <button class="fullscreen-btn" aria-label="Fullscreen">⛶</button>
      </div>
    </div>
  </div>
  
  <div class="instructions">
    <kbd>Space</kbd>/<kbd>K</kbd> play/pause • 
    <kbd>←</kbd><kbd>→</kbd> seek 5s • 
    <kbd>↑</kbd><kbd>↓</kbd> volume • 
    <kbd>M</kbd> mute • 
    <kbd>F</kbd> fullscreen
  </div>

  <script src="solution.js"></script>
</body>
</html>
