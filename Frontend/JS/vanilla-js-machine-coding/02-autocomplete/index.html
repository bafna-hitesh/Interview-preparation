<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete - Interview Solution</title>
  <style>
    * { box-sizing: border-box; }
    
    html {
      font-size: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    h1 {
      color: #fff;
      font-size: 2.4rem;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    
    .search-form {
      position: relative;
      width: 100%;
      max-width: 500px;
    }
    
    .search {
      width: 100%;
      padding: 1.5rem 2rem;
      font-size: 1.6rem;
      border: none;
      border-radius: 8px;
      outline: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .search:focus {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), 0 0 0 3px rgba(255, 255, 255, 0.5);
    }
    
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin: 0;
      padding: 0;
      list-style: none;
      background: #fff;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      max-height: 300px;
      overflow-y: auto;
    }
    
    .suggestions[hidden] {
      display: none;
    }
    
    .suggestions li {
      padding: 1.2rem 2rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      font-size: 1.4rem;
    }
    
    .suggestions li:last-child {
      border-bottom: none;
    }
    
    .suggestions li:hover,
    .suggestions li.selected {
      background: #f0f0f0;
    }
    
    .suggestions li.loading,
    .suggestions li.no-results,
    .suggestions li.error {
      color: #888;
      cursor: default;
    }
    
    .suggestions li.error {
      color: #e74c3c;
    }
    
    .suggestions mark {
      background: #ffc600;
      padding: 0 2px;
    }
    
    .name {
      font-weight: 500;
    }
    
    .population {
      font-size: 1.2rem;
      color: #888;
    }
    
    .instructions {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.2rem;
      margin-top: 2rem;
    }
    
    kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>City Search</h1>
  
  <form class="search-form" role="search" onsubmit="return false;">
    <input type="text" 
           class="search" 
           placeholder="Search for a city or state..."
           aria-label="Search for a city or state"
           autocomplete="off">
    <ul class="suggestions" hidden></ul>
  </form>
  
  <p class="instructions">
    Use <kbd>↑</kbd> <kbd>↓</kbd> to navigate, <kbd>Enter</kbd> to select, <kbd>Esc</kbd> to close
  </p>

  <script src="solution.js"></script>
</body>
</html>
